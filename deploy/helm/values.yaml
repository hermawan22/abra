image:
  repository: ghcr.io/hermawan22/abra
  tag: ""
  # Replace with the release IMAGE_DIGEST, for example sha256:<64-hex-digest>.
  digest: "sha256:<replace-with-release-digest>"
  pullPolicy: IfNotPresent

api:
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 512Mi

worker:
  replicas: 1
  interval: 5m
  maxSourcesPerRun: "25"
  concurrency: "1"
  gitCacheDir: /var/cache/abra/git
  gitCacheSizeLimit: 1Gi
  gitCloneDepth: "1"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 2Gi

migrate:
  enabled: true
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  hookDeletePolicy: before-hook-creation,hook-succeeded
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 256Mi

config:
  nodeEnv: production
  bindAddress: "0.0.0.0"
  port: "8080"
  apiReadTimeout: 2m
  maxRequestBodyBytes: "26214400"
  embeddingProvider: compatible
  embeddingModel: embedding-model
  embeddingDimensions: "1024"
  embeddingTimeout: 30s
  embeddingBatchMaxItems: "16"
  embeddingBatchMaxTokens: "6000"
  rerankerProvider: ""
  rerankerModel: ""
  allowUnsignedWebhooksInProduction: "false"
  allowLocalEmbeddingsInProduction: "false"
  approvalMode: enforce
  auditSinkUrl: ""
  auditSinkScope: ""
  auditSinkBatchSize: "100"
  redactPii: "true"
  rateLimitMax: "120"
  rateLimitWindow: 1 minute
  aiProviderConcurrency: "4"
  composeHealthCacheTtl: 2s
  composeRecallConcurrency: "1"
  composeGraphConcurrency: "4"
  otelExporterOtlpEndpoint: ""
  tracingEnabled: "false"
  tracingSampleRatio: "1"
  tracingInsecure: "false"
  serviceName: abra
  deploymentEnvironment: production

secrets:
  existingSecret: abra-secrets
  keys:
    databaseUrl: DATABASE_URL
    apiKeys: ABRA_API_KEYS
    webhookSecrets: ABRA_WEBHOOK_SECRETS
    auditSinkToken: ABRA_AUDIT_SINK_TOKEN
    auditSinkSecret: ABRA_AUDIT_SINK_SECRET
    embeddingBaseUrl: EMBEDDING_BASE_URL
    embeddingApiKey: EMBEDDING_API_KEY
    rerankerBaseUrl: RERANKER_BASE_URL
    rerankerApiKey: RERANKER_API_KEY

service:
  type: ClusterIP
  port: 80

networkPolicy:
  enabled: true
  # By default, only pods explicitly labelled as Abra API clients can reach the
  # API Service. Add namespaceSelector/podSelector entries for ingress
  # controllers, gateways, Prometheus, or agent runtimes that live outside the
  # release namespace.
  apiIngress:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: abra
          abra.dev/api-client: "true"
  extraApiIngress: []

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  bearerTokenSecret:
    name: abra-metrics-token
    key: token
  labels: {}

prometheusRule:
  enabled: false
  labels: {}
  rules:
    apiDown:
      enabled: true
      for: 5m
      severity: critical
    high5xxRate:
      enabled: true
      for: 10m
      severity: warning
      threshold: 0.05
    memoryComposeFailures:
      enabled: true
      for: 10m
      severity: warning
    aiProviderQueueing:
      enabled: true
      for: 10m
      severity: warning
      minWaitRate: 0.05
    ingestionStaleRunningJobs:
      enabled: true
      for: 15m
      severity: critical
    ingestionFailedJobs:
      enabled: true
      for: 15m
      severity: warning

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: abra.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
