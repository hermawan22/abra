{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "abra.fullname" . }}
  labels:
    {{- include "abra.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: {{ include "abra.fullname" . }}.rules
      rules:
        {{- if .Values.prometheusRule.rules.apiDown.enabled }}
        - alert: AbraApiDown
          expr: absent(abra_build_info{runtime="go",abra_release="{{ .Release.Name }}",abra_service="{{ include "abra.fullname" . }}"} == 1)
          for: {{ .Values.prometheusRule.rules.apiDown.for }}
          labels:
            severity: {{ .Values.prometheusRule.rules.apiDown.severity | quote }}
          annotations:
            summary: "Abra API metrics target is down"
            description: "Prometheus has no healthy scrape for the Abra API ServiceMonitor target."
        {{- end }}
        {{- if .Values.prometheusRule.rules.high5xxRate.enabled }}
        - alert: AbraHigh5xxRate
          expr: |
            (
              sum(rate(abra_http_requests_total{abra_release="{{ .Release.Name }}",abra_service="{{ include "abra.fullname" . }}",status=~"5.."}[5m]))
              /
              sum(rate(abra_http_requests_total{abra_release="{{ .Release.Name }}",abra_service="{{ include "abra.fullname" . }}"}[5m]))
            ) > {{ .Values.prometheusRule.rules.high5xxRate.threshold }}
            and
            sum(rate(abra_http_requests_total{abra_release="{{ .Release.Name }}",abra_service="{{ include "abra.fullname" . }}"}[5m])) > 0
          for: {{ .Values.prometheusRule.rules.high5xxRate.for }}
          labels:
            severity: {{ .Values.prometheusRule.rules.high5xxRate.severity | quote }}
          annotations:
            summary: "Abra API 5xx rate is elevated"
            description: "More than {{ .Values.prometheusRule.rules.high5xxRate.threshold }} of Abra API requests returned 5xx over the last five minutes."
        {{- end }}
        {{- if .Values.prometheusRule.rules.memoryComposeFailures.enabled }}
        - alert: AbraMemoryComposeFailures
          expr: sum(rate(abra_smart_path_requests_total{abra_release="{{ .Release.Name }}",abra_service="{{ include "abra.fullname" . }}",operation="working_memory",status!="ok"}[5m])) > 0
          for: {{ .Values.prometheusRule.rules.memoryComposeFailures.for }}
          labels:
            severity: {{ .Values.prometheusRule.rules.memoryComposeFailures.severity | quote }}
          annotations:
            summary: "Abra memory compose is failing"
            description: "At least one working-memory compose request failed recently."
        {{- end }}
        {{- if .Values.prometheusRule.rules.aiProviderQueueing.enabled }}
        - alert: AbraAIProviderQueueing
          expr: |
            sum(rate(abra_ai_provider_waits_total{abra_release="{{ .Release.Name }}",abra_service="{{ include "abra.fullname" . }}"}[5m]))
            > {{ .Values.prometheusRule.rules.aiProviderQueueing.minWaitRate }}
          for: {{ .Values.prometheusRule.rules.aiProviderQueueing.for }}
          labels:
            severity: {{ .Values.prometheusRule.rules.aiProviderQueueing.severity | quote }}
          annotations:
            summary: "Abra AI provider queueing is elevated"
            description: "Embedding or rerank calls are waiting for provider concurrency slots. Check provider capacity, ABRA_AI_PROVIDER_CONCURRENCY, worker concurrency, and model endpoint latency."
        {{- end }}
        {{- if .Values.prometheusRule.rules.ingestionStaleRunningJobs.enabled }}
        - alert: AbraIngestionStaleRunningJobs
          expr: max(abra_working_memory_health_ingestion_stale_running_jobs{abra_release="{{ .Release.Name }}",abra_service="{{ include "abra.fullname" . }}"}) > 0
          for: {{ .Values.prometheusRule.rules.ingestionStaleRunningJobs.for }}
          labels:
            severity: {{ .Values.prometheusRule.rules.ingestionStaleRunningJobs.severity | quote }}
          annotations:
            summary: "Abra ingestion has stale running jobs"
            description: "Scoped memory health observed stale running ingestion jobs. Restart or inspect workers and retry affected jobs after the source or provider issue is fixed."
        {{- end }}
        {{- if .Values.prometheusRule.rules.ingestionFailedJobs.enabled }}
        - alert: AbraIngestionFailedJobs
          expr: max(abra_working_memory_health_ingestion_failed_jobs{abra_release="{{ .Release.Name }}",abra_service="{{ include "abra.fullname" . }}"}) > 0
          for: {{ .Values.prometheusRule.rules.ingestionFailedJobs.for }}
          labels:
            severity: {{ .Values.prometheusRule.rules.ingestionFailedJobs.severity | quote }}
          annotations:
            summary: "Abra ingestion jobs are failing"
            description: "Scoped memory health observed failed ingestion jobs. Inspect job errors before relying on memory freshness for autonomous agents."
        {{- end }}
{{- end }}
