{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "abra.fullname" . }}
  labels:
    {{- include "abra.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "abra.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path | quote }}
      interval: {{ .Values.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | quote }}
      {{- with .Values.serviceMonitor.bearerTokenSecret }}
      bearerTokenSecret:
        name: {{ .name | quote }}
        key: {{ .key | quote }}
      {{- end }}
      metricRelabelings:
        - action: replace
          targetLabel: abra_release
          replacement: {{ .Release.Name | quote }}
        - action: replace
          targetLabel: abra_service
          replacement: {{ include "abra.fullname" . | quote }}
{{- end }}
