apiVersion: v1
kind: Secret
metadata:
  name: abra-secrets
type: Opaque
stringData:
  DATABASE_URL: postgres://user:password@postgres.example.internal:5432/abra
  ABRA_API_KEYS: replace-with-generated-token
  ABRA_WEBHOOK_SECRETS: replace-with-webhook-signing-secret
  ABRA_AUDIT_SINK_TOKEN: replace-with-siem-bearer-token
  ABRA_AUDIT_SINK_SECRET: replace-with-siem-signing-secret
  EMBEDDING_BASE_URL: https://embedding-provider.example/v1
  EMBEDDING_API_KEY: ""
  RERANKER_BASE_URL: ""
  RERANKER_API_KEY: ""
