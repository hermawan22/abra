apiVersion: v1
kind: ConfigMap
metadata:
  name: abra-config
data:
  NODE_ENV: "production"
  PORT: "8080"
  EMBEDDING_PROVIDER: "compatible"
  EMBEDDING_MODEL: "embedding-model"
  EMBEDDING_DIMENSIONS: "1024"
  EMBEDDING_TIMEOUT: "30s"
  RERANKER_PROVIDER: ""
  RERANKER_MODEL: ""
  ALLOW_LOCAL_EMBEDDINGS_IN_PRODUCTION: "false"
  ABRA_APPROVAL_MODE: "enforce"
  ABRA_AUDIT_SINK_URL: ""
  ABRA_AUDIT_SINK_SCOPE: ""
  ABRA_AUDIT_SINK_BATCH_SIZE: "100"
  REDACT_PII: "true"
  RATE_LIMIT_MAX: "120"
  RATE_LIMIT_WINDOW: "1 minute"
  ABRA_AI_PROVIDER_CONCURRENCY: "4"
  ABRA_COMPOSE_HEALTH_CACHE_TTL: "2s"
  ABRA_COMPOSE_RECALL_CONCURRENCY: "1"
  ABRA_COMPOSE_GRAPH_CONCURRENCY: "4"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  ABRA_TRACING_ENABLED: "false"
  ABRA_TRACING_SAMPLE_RATIO: "1"
  ABRA_TRACING_INSECURE: "false"
  ABRA_SERVICE_NAME: "abra"
  ABRA_DEPLOYMENT_ENVIRONMENT: "production"
  WORKER_INTERVAL: "5m"
  WORKER_MAX_SOURCES_PER_RUN: "25"
  WORKER_CONCURRENCY: "1"
  ABRA_GIT_CACHE_DIR: "/tmp/abra-git-cache"
  ABRA_GIT_CLONE_DEPTH: "1"
