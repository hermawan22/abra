apiVersion: batch/v1
kind: Job
metadata:
  name: abra-migrate
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: abra:local
          imagePullPolicy: IfNotPresent
          command: ["/app/abra-migrate"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: abra-config
            - secretRef:
                name: abra-secrets
