name: Bug report
description: Report a reproducible Abra bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private source text, embeddings, database dumps, or audit records.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Deploy with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - API
        - MCP
        - Worker
        - CLI
        - Docker Compose
        - Kubernetes/Helm
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Abra version, deployment path, Postgres/pgvector version, embedding provider type, and relevant config with secrets redacted.
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste only redacted logs.
      render: shell
