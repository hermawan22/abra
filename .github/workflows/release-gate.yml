name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-release-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.11"
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Start local embedding model
        timeout-minutes: 18
        run: go run ./cmd/abra models up --reranker-provider none --startup-timeout 12m --readiness-timeout 30s

      - name: Run quick managed release gate
        run: |
          ABRA_RELEASE_PROFILE=quick \
          ABRA_RELEASE_MANAGE_STACK=1 \
          ABRA_RELEASE_QUEUE_PRESSURE_GATE=1 \
          ABRA_RELEASE_COMMAND_TIMEOUT_MS=300000 \
          npm run release:gate | tee abra-release-gate.json

      - name: Upload release gate report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: abra-release-gate
          path: abra-release-gate.json
