name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-release-gate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.11"
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Start local embedding model
        run: go run ./cmd/abra models up

      - name: Run quick managed release gate
        run: |
          ABRA_RELEASE_PROFILE=quick \
          ABRA_RELEASE_MANAGE_STACK=1 \
          ABRA_RELEASE_QUEUE_PRESSURE_GATE=1 \
          ABRA_RELEASE_COMMAND_TIMEOUT_MS=300000 \
          npm run release:gate | tee abra-release-gate.json

      - name: Upload release gate report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: abra-release-gate
          path: abra-release-gate.json
