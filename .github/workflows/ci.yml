name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: abra
          POSTGRES_PASSWORD: abra
          POSTGRES_DB: abra
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U abra -d abra"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.11"
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Check ops and eval scripts
        run: npm test

      - name: Test Go packages
        run: go test ./...

      - name: Vet Go packages
        run: go vet ./...

      - name: Run Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Check Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./...

      - name: Check npm vulnerabilities
        run: npm audit --audit-level=high

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Lint Helm chart
        run: helm lint ./deploy/helm

      - name: Render Helm chart
        run: helm template abra ./deploy/helm >/tmp/abra-helm-template.yaml

      - name: Render production Compose config
        run: |
          cat > /tmp/abra.env.production.test <<'EOF'
          POSTGRES_IMAGE=pgvector/pgvector:pg16
          POSTGRES_PASSWORD=test-postgres-password
          ABRA_IMAGE=abra:test
          ABRA_DATABASE_URL=postgres://abra:test-postgres-password@postgres:5432/abra?sslmode=disable
          ABRA_API_KEYS=test-admin-key
          ABRA_APPROVAL_MODE=enforce
          ABRA_WEBHOOK_SECRETS=test-webhook-secret
          EMBEDDING_PROVIDER=compatible
          EMBEDDING_BASE_URL=https://embedding-provider.example/v1
          EMBEDDING_API_KEY=test-embedding-key
          EMBEDDING_MODEL=embedding-model-1536
          EMBEDDING_DIMENSIONS=1536
          ALLOW_LOCAL_EMBEDDINGS_IN_PRODUCTION=false
          EOF
          docker compose --env-file /tmp/abra.env.production.test --profile setup config >/tmp/abra-compose-config.yaml

      - name: Check public repo hygiene
        run: npm run check:oss

      - name: Build Go binaries
        run: |
          go build ./cmd/abra-api
          go build ./cmd/abra-worker
          go build ./cmd/abra-migrate
          go build ./cmd/abra

      - name: Build container image
        run: docker build -t abra:${{ github.sha }} .
