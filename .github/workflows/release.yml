name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build CLI
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/abra ./cmd/abra
          tar -C dist -czf "dist/abra_${GOOS}_${GOARCH}.tar.gz" abra
      - uses: actions/upload-artifact@v4
        with:
          name: abra_${{ matrix.os }}_${{ matrix.arch }}
          path: dist/abra_${{ matrix.os }}_${{ matrix.arch }}.tar.gz

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          sha256sum abra_*.tar.gz > SHA256SUMS
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/abra_*.tar.gz
            dist/SHA256SUMS
