name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  preflight:
    name: release preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Verify release tag and version metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $TAG" >&2
            exit 1
          fi

          version="${TAG#v}"
          package_version="$(node -p "require('./package.json').version")"
          package_lock_version="$(node -p "require('./package-lock.json').version")"
          package_lock_root_version="$(node -p "require('./package-lock.json').packages[''].version")"
          chart_version="$(awk -F': *' '$1 == "version" {gsub(/"/, "", $2); print $2}' deploy/helm/Chart.yaml)"
          chart_app_version="$(awk -F': *' '$1 == "appVersion" {gsub(/"/, "", $2); print $2}' deploy/helm/Chart.yaml)"
          runtime_version="$(awk -F'"' '$1 ~ /Version = / {print $2; exit}' internal/version/info.go)"
          changelog_version="$(awk '/^## [0-9]+\.[0-9]+\.[0-9]+ / {print $2; exit}' CHANGELOG.md)"

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release tag ${TAG} must point to a commit reachable from origin/main" >&2
            exit 1
          fi
          if [[ "$package_version" != "$version" ]]; then
            echo "package.json version $package_version does not match tag $TAG" >&2
            exit 1
          fi
          if [[ "$package_lock_version" != "$version" || "$package_lock_root_version" != "$version" ]]; then
            echo "package-lock.json version does not match tag $TAG" >&2
            exit 1
          fi
          if [[ "$chart_version" != "$version" ]]; then
            echo "Helm chart version $chart_version does not match tag $TAG" >&2
            exit 1
          fi
          if [[ "$chart_app_version" != "$version" ]]; then
            echo "Helm appVersion $chart_app_version does not match tag $TAG" >&2
            exit 1
          fi
          if [[ "$runtime_version" != "$version" ]]; then
            echo "internal/version/info.go version $runtime_version does not match tag $TAG" >&2
            exit 1
          fi
          if [[ "$changelog_version" != "$version" ]]; then
            echo "Latest numbered CHANGELOG.md entry $changelog_version does not match tag $TAG" >&2
            exit 1
          fi

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/git/ref/tags/${TAG}" \
            > /tmp/abra-release-ref.json

          tag_object_url="$(node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const ref = JSON.parse(fs.readFileSync('/tmp/abra-release-ref.json', 'utf8'));
          if (ref.object?.type !== 'tag') {
            console.error(`Release tag must be an annotated signed tag; got ${ref.object?.type ?? 'unknown'}.`);
            process.exit(1);
          }
          console.log(ref.object.url);
          NODE
          )"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$tag_object_url" \
            > /tmp/abra-release-tag.json

          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const tag = JSON.parse(fs.readFileSync('/tmp/abra-release-tag.json', 'utf8'));
          const expectedTag = process.env.TAG;
          if (tag.tag !== expectedTag) {
            console.error(`Tag object name ${tag.tag} does not match ${expectedTag}.`);
            process.exit(1);
          }
          if (!tag.verification?.verified) {
            console.error(`Release tag signature is not verified: ${tag.verification?.reason ?? 'missing verification'}.`);
            process.exit(1);
          }
          console.log(`Verified signed release tag: ${expectedTag}`);
          NODE

  release_gate:
    name: release gate
    needs: preflight
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Run Go vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./...

      - name: Run npm vulnerability check
        run: npm audit --audit-level=high

      - name: Start local embedding model
        timeout-minutes: 18
        run: go run ./cmd/abra models up --reranker-provider none --startup-timeout 12m --readiness-timeout 30s

      - name: Run release gate
        run: |
          ABRA_RELEASE_PROFILE=full \
          ABRA_RELEASE_MANAGE_STACK=1 \
          ABRA_RELEASE_COMMAND_TIMEOUT_MS=900000 \
          npm run release:gate | tee abra-release-gate.json

      - name: Upload release gate report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: abra-release-gate-${{ github.ref_name }}
          path: abra-release-gate.json

  build:
    name: build ${{ matrix.os }} ${{ matrix.arch }}
    needs: release_gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build CLI
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/abra ./cmd/abra
          cp LICENSE README.md dist/
          tar -C dist -czf "dist/abra_${GOOS}_${GOARCH}.tar.gz" abra LICENSE README.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: abra_${{ matrix.os }}_${{ matrix.arch }}
          path: dist/abra_${{ matrix.os }}_${{ matrix.arch }}.tar.gz

  image:
    name: build image
    needs: release_gate
    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set image metadata
        id: image_metadata
        run: |
          set -euo pipefail
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "image_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image_metadata.outputs.image_name }}:${{ github.ref_name }}
            ${{ steps.image_metadata.outputs.image_name }}:${{ steps.image_metadata.outputs.image_version }}
            ${{ steps.image_metadata.outputs.image_name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=Abra
            org.opencontainers.image.description=CLI-first governed brain layer for AI agents
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          build-args: |
            ABRA_VERSION=${{ github.ref_name }}
            ABRA_COMMIT=${{ github.sha }}
            ABRA_DATE=${{ steps.image_metadata.outputs.build_date }}
          provenance: mode=max
          sbom: true

      - name: Attest image provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ steps.image_metadata.outputs.image_name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Write image digest artifact
        run: |
          set -euo pipefail
          mkdir -p dist-image
          {
            echo "${IMAGE_NAME}@${DIGEST}"
            echo "${IMAGE_NAME}:${GITHUB_REF_NAME}@${DIGEST}"
            echo "${IMAGE_NAME}:${ABRA_IMAGE_VERSION}@${DIGEST}"
            echo "${IMAGE_NAME}:${GITHUB_SHA}@${DIGEST}"
          } > dist-image/IMAGE_DIGEST
        env:
          IMAGE_NAME: ${{ steps.image_metadata.outputs.image_name }}
          ABRA_IMAGE_VERSION: ${{ steps.image_metadata.outputs.image_version }}
          DIGEST: ${{ steps.image.outputs.digest }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: abra_image_digest
          path: dist-image/IMAGE_DIGEST

  publish:
    name: publish release
    needs:
      - build
      - image
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: abra*
          merge-multiple: true
      - name: Stage installer script
        run: |
          set -euo pipefail
          cp scripts/install.sh dist/install.sh
          chmod 0644 dist/install.sh
      - name: Stage runtime bundle
        run: |
          set -euo pipefail
          runtime_root="dist-runtime/abra-runtime"
          mkdir -p "$runtime_root"
          cp docker-compose.yml "$runtime_root/docker-compose.yml"
          cp dist/IMAGE_DIGEST "$runtime_root/IMAGE_DIGEST"
          tar -C dist-runtime -czf "dist/abra_runtime_${GITHUB_REF_NAME}.tar.gz" abra-runtime
      - name: Checksums
        run: |
          set -euo pipefail
          asset_count="$(find dist -maxdepth 1 -type f \( -name 'abra_linux_*.tar.gz' -o -name 'abra_darwin_*.tar.gz' \) | wc -l | tr -d ' ')"
          if [ "$asset_count" -ne 4 ]; then
            echo "Expected 4 release archives, found $asset_count" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          fi
          runtime_count="$(find dist -maxdepth 1 -type f -name 'abra_runtime_*.tar.gz' | wc -l | tr -d ' ')"
          if [ "$runtime_count" -ne 1 ]; then
            echo "Expected 1 runtime bundle, found $runtime_count" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          fi
          if [ ! -s dist/IMAGE_DIGEST ]; then
            echo "Expected image digest artifact at dist/IMAGE_DIGEST" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          fi
          if [ ! -s dist/abra-release-gate.json ]; then
            echo "Expected release gate report at dist/abra-release-gate.json" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          fi
          cd dist
          sha256sum abra_*.tar.gz install.sh IMAGE_DIGEST abra-release-gate.json > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Verify staged install script
        run: |
          set -euo pipefail
          install_dir="$(mktemp -d)"
          ABRA_RELEASE_BASE_URL="file://${PWD}/dist" \
            ABRA_VERSION="${GITHUB_REF_NAME}" \
            ABRA_INSTALL_DIR="$install_dir" \
            ABRA_VERIFY_ATTESTATION=0 \
            sh scripts/install.sh
          "$install_dir/abra" version --json
          "$install_dir/abra" scope | tee /tmp/abra-staged-scope.txt
          grep -F 'discover_scopes with expected_scope="repo:abra"' /tmp/abra-staged-scope.txt
          grep -F 'task=<current task>' /tmp/abra-staged-scope.txt
          grep -F 'agent="codex"' /tmp/abra-staged-scope.txt
          grep -F 'source-backed context' /tmp/abra-staged-scope.txt
          "$install_dir/abra" agents verify . --scope repo:abra --files-only --strict

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/abra_*.tar.gz
            dist/install.sh
            dist/IMAGE_DIGEST
            dist/abra-release-gate.json
            dist/SHA256SUMS

      - name: Verify release artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for artifact in dist/abra_*.tar.gz dist/install.sh dist/SHA256SUMS dist/IMAGE_DIGEST dist/abra-release-gate.json; do
            gh attestation verify --repo "$GITHUB_REPOSITORY" "$artifact"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/abra_*.tar.gz
            dist/install.sh
            dist/SHA256SUMS
            dist/IMAGE_DIGEST
            dist/abra-release-gate.json
