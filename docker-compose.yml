services:
  postgres:
    image: ${POSTGRES_IMAGE:?set POSTGRES_IMAGE to a digest-pinned pgvector image or use docker-compose.dev.yml for local builds}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-abra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-abra}
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - abra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abra} -d ${POSTGRES_DB:-abra}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: ${ABRA_IMAGE:?set ABRA_IMAGE to a digest-pinned Abra image or use docker-compose.dev.yml for local builds}
    command: ["/app/abra-migrate"]
    environment:
      DATABASE_URL: ${ABRA_DATABASE_URL:?set ABRA_DATABASE_URL}
      NODE_ENV: ${NODE_ENV:-production}
      ABRA_API_KEYS: ${ABRA_API_KEYS:?set ABRA_API_KEYS}
      ABRA_WEBHOOK_SECRETS: ${ABRA_WEBHOOK_SECRETS:-}
      ABRA_ALLOW_UNSIGNED_WEBHOOKS_IN_PRODUCTION: ${ABRA_ALLOW_UNSIGNED_WEBHOOKS_IN_PRODUCTION:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-compatible}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:?set EMBEDDING_BASE_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embedding-model}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-30s}
      ABRA_EMBEDDING_BATCH_MAX_ITEMS: ${ABRA_EMBEDDING_BATCH_MAX_ITEMS:-16}
      ABRA_EMBEDDING_BATCH_MAX_TOKENS: ${ABRA_EMBEDDING_BATCH_MAX_TOKENS:-6000}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-http://host.docker.internal:8081}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      RERANKER_MODEL: ${RERANKER_MODEL:-}
      ALLOW_LOCAL_EMBEDDINGS_IN_PRODUCTION: ${ALLOW_LOCAL_EMBEDDINGS_IN_PRODUCTION:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - setup

  api:
    image: ${ABRA_IMAGE:?set ABRA_IMAGE to a digest-pinned Abra image or use docker-compose.dev.yml for local builds}
    command: ["/app/abra-api"]
    environment:
      DATABASE_URL: ${ABRA_DATABASE_URL:?set ABRA_DATABASE_URL}
      PORT: ${PORT:-8080}
      ABRA_BIND_ADDR: ${ABRA_BIND_ADDR:-0.0.0.0}
      ABRA_API_READ_TIMEOUT: ${ABRA_API_READ_TIMEOUT:-}
      ABRA_MAX_REQUEST_BODY_BYTES: ${ABRA_MAX_REQUEST_BODY_BYTES:-}
      NODE_ENV: ${NODE_ENV:-production}
      ABRA_API_KEYS: ${ABRA_API_KEYS:?set ABRA_API_KEYS}
      ABRA_APPROVAL_MODE: ${ABRA_APPROVAL_MODE:-enforce}
      ABRA_WEBHOOK_SECRETS: ${ABRA_WEBHOOK_SECRETS:-}
      ABRA_ALLOW_UNSIGNED_WEBHOOKS_IN_PRODUCTION: ${ABRA_ALLOW_UNSIGNED_WEBHOOKS_IN_PRODUCTION:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-compatible}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:?set EMBEDDING_BASE_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embedding-model}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-30s}
      ABRA_EMBEDDING_BATCH_MAX_ITEMS: ${ABRA_EMBEDDING_BATCH_MAX_ITEMS:-16}
      ABRA_EMBEDDING_BATCH_MAX_TOKENS: ${ABRA_EMBEDDING_BATCH_MAX_TOKENS:-6000}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-http://host.docker.internal:8081}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      RERANKER_MODEL: ${RERANKER_MODEL:-}
      ALLOW_LOCAL_EMBEDDINGS_IN_PRODUCTION: ${ALLOW_LOCAL_EMBEDDINGS_IN_PRODUCTION:-false}
      REDACT_PII: ${REDACT_PII:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1 minute}
      ABRA_COMPOSE_HEALTH_CACHE_TTL: ${ABRA_COMPOSE_HEALTH_CACHE_TTL:-2s}
      ABRA_COMPOSE_RECALL_CONCURRENCY: ${ABRA_COMPOSE_RECALL_CONCURRENCY:-1}
      ABRA_COMPOSE_GRAPH_CONCURRENCY: ${ABRA_COMPOSE_GRAPH_CONCURRENCY:-4}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      ABRA_OTEL_EXPORTER_OTLP_ENDPOINT: ${ABRA_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      ABRA_TRACING_ENABLED: ${ABRA_TRACING_ENABLED:-false}
      ABRA_TRACING_SAMPLE_RATIO: ${ABRA_TRACING_SAMPLE_RATIO:-1}
      ABRA_TRACING_INSECURE: ${ABRA_TRACING_INSECURE:-false}
      ABRA_SERVICE_NAME: ${ABRA_SERVICE_NAME:-}
      ABRA_DEPLOYMENT_ENVIRONMENT: ${ABRA_DEPLOYMENT_ENVIRONMENT:-production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${ABRA_PUBLISH_ADDR:-127.0.0.1}:${ABRA_PORT:-18080}:${PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ${ABRA_IMAGE:?set ABRA_IMAGE to a digest-pinned Abra image or use docker-compose.dev.yml for local builds}
    command: ["/app/abra-worker"]
    environment:
      DATABASE_URL: ${ABRA_DATABASE_URL:?set ABRA_DATABASE_URL}
      NODE_ENV: ${NODE_ENV:-production}
      ABRA_API_KEYS: ${ABRA_API_KEYS:?set ABRA_API_KEYS}
      ABRA_APPROVAL_MODE: ${ABRA_APPROVAL_MODE:-enforce}
      ABRA_WEBHOOK_SECRETS: ${ABRA_WEBHOOK_SECRETS:-}
      ABRA_ALLOW_UNSIGNED_WEBHOOKS_IN_PRODUCTION: ${ABRA_ALLOW_UNSIGNED_WEBHOOKS_IN_PRODUCTION:-false}
      ABRA_AUDIT_SINK_URL: ${ABRA_AUDIT_SINK_URL:-}
      ABRA_AUDIT_SINK_TOKEN: ${ABRA_AUDIT_SINK_TOKEN:-}
      ABRA_AUDIT_SINK_SECRET: ${ABRA_AUDIT_SINK_SECRET:-}
      ABRA_AUDIT_SINK_SCOPE: ${ABRA_AUDIT_SINK_SCOPE:-}
      ABRA_AUDIT_SINK_BATCH_SIZE: ${ABRA_AUDIT_SINK_BATCH_SIZE:-100}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-compatible}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:?set EMBEDDING_BASE_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embedding-model}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-30s}
      ABRA_EMBEDDING_BATCH_MAX_ITEMS: ${ABRA_EMBEDDING_BATCH_MAX_ITEMS:-16}
      ABRA_EMBEDDING_BATCH_MAX_TOKENS: ${ABRA_EMBEDDING_BATCH_MAX_TOKENS:-6000}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-http://host.docker.internal:8081}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      RERANKER_MODEL: ${RERANKER_MODEL:-}
      ALLOW_LOCAL_EMBEDDINGS_IN_PRODUCTION: ${ALLOW_LOCAL_EMBEDDINGS_IN_PRODUCTION:-false}
      REDACT_PII: ${REDACT_PII:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1 minute}
      WORKER_INTERVAL: ${WORKER_INTERVAL:-5m}
      WORKER_MAX_SOURCES_PER_RUN: ${WORKER_MAX_SOURCES_PER_RUN:-25}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      WORKER_SOURCE_TIMEOUT: ${WORKER_SOURCE_TIMEOUT:-}
      WORKER_LEASE_TIMEOUT: ${WORKER_LEASE_TIMEOUT:-}
      WORKER_MAX_CHANGED_DOCUMENTS_PER_SOURCE: ${WORKER_MAX_CHANGED_DOCUMENTS_PER_SOURCE:-100}
      ABRA_GIT_CACHE_DIR: ${ABRA_GIT_CACHE_DIR:-/var/cache/abra/git}
      ABRA_GIT_CLONE_DEPTH: ${ABRA_GIT_CLONE_DEPTH:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      ABRA_OTEL_EXPORTER_OTLP_ENDPOINT: ${ABRA_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      ABRA_TRACING_ENABLED: ${ABRA_TRACING_ENABLED:-false}
      ABRA_TRACING_SAMPLE_RATIO: ${ABRA_TRACING_SAMPLE_RATIO:-1}
      ABRA_TRACING_INSECURE: ${ABRA_TRACING_INSECURE:-false}
      ABRA_SERVICE_NAME: ${ABRA_SERVICE_NAME:-}
      ABRA_DEPLOYMENT_ENVIRONMENT: ${ABRA_DEPLOYMENT_ENVIRONMENT:-production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - abra-git-cache:/var/cache/abra/git
    restart: unless-stopped

volumes:
  abra-postgres:
  abra-git-cache:
